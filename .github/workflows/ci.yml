name: ModelDoctor CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: modeldoctor_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_secure_pass_123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'backend/requirements.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Pytest
      env:
        POSTGRES_DB: modeldoctor_db
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres_secure_pass_123
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        SECRET_KEY: django-ci-test-secret-key-99999
        DEBUG: "True"
        CELERY_BROKER_URL: redis://localhost:6379/0
        CELERY_RESULT_BACKEND: redis://localhost:6379/0
      run: |
        cd backend
        python manage.py makemigrations accounts
        python manage.py makemigrations
        pytest --cov=. --cov-report=xml

  frontend-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
        # Since we don't commit package-lock.json initially, we can cache based on package.json or skip cache configuration if package-lock is missing

    - name: Install dependencies
      run: |
        cd frontend
        npm install

    - name: Run Eslint
      run: |
        cd frontend
        npm run lint
